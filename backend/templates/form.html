<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0e0e;
            --card: #161616;
            --border: #2a2a2a;
            --accent: #c8f135;
            --text: #f0f0f0;
            --muted: #666;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .card-subtitle {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .results-link {
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
        }

        .results-link:hover { color: var(--accent); }

        #inputs-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .input-label {
            font-size: 0.7rem;
            color: var(--muted);
            min-width: 60px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            padding: 0.6rem 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--muted); }

        .btn-remove {
            background: none;
            border: 1px solid #333;
            border-radius: 3px;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0.4rem 0.6rem;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-remove:hover { border-color: #e55; color: #e55; }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        button {
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            border-radius: 3px;
            padding: 0.65rem 1.2rem;
            transition: all 0.15s;
        }

        #add-btn {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #0e0e0e;
            font-weight: 500;
            flex: 1;
        }

        #add-btn:hover { background: #d8ff45; }

        #submit-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
        }

        #submit-btn:hover { border-color: var(--text); }

        .toast {
            display: none;
            margin-top: 1rem;
            font-size: 0.75rem;
            padding: 0.6rem 1rem;
            border-radius: 3px;
            border: 1px solid;
        }

        .toast.success { border-color: var(--accent); color: var(--accent); }
        .toast.error   { border-color: #e55; color: #e55; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="card-title">Форма</div>
            <a href="/info" class="results-link">данные →</a>
        </div>
        <form id="dynamic-form">
            <div id="inputs-container">
                <div class="input-row">
                    <span class="input-label">name</span>
                    <input type="text" name="name" placeholder="Enter value...">
                </div>
            </div>

            <div class="actions">
                <button type="button" id="add-btn">+ Добавить</button>
                <button type="submit" id="submit-btn">Отправить</button>
            </div>
        </form>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        let counter = 1;

        $('#add-btn').on('click', function () {
            const fieldName = 'name' + counter;
            const $row = $(`
                <div class="input-row">
                    <span class="input-label">${fieldName}</span>
                    <input type="text" name="${fieldName}" placeholder="Enter value...">
                    <button type="button" class="btn-remove">×</button>
                </div>
            `);
            $('#inputs-container').append($row);
            counter++;
        });

        $(document).on('click', '.btn-remove', function () {
            $(this).closest('.input-row').remove();
        });

        $('#dynamic-form').on('submit', function (e) {
            e.preventDefault();

            const formData = {};
            $(this).serializeArray().forEach(function (field) {
                formData[field.name] = field.value;
            });

            $.ajax({
                url: '/data',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                success: function () {
                    showToast('Сохранено успешно', 'success');
                    $('#dynamic-form')[0].reset();
                    $('#inputs-container .input-row:not(:first)').remove();
                    counter = 1;
                },
                error: function () {
                    showToast('Ошибка при сохранении', 'error');
                }
            });
        });

        function showToast(msg, type) {
            $('#toast')
                .removeClass('success error')
                .addClass(type)
                .text(msg)
                .fadeIn(150)
                .delay(2500)
                .fadeOut(300);
        }
    </script>
</body>
</html>
