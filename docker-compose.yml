services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - ./backend/.env
    volumes:
      - app_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5


  flask:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: [ "uv", "run", "gunicorn", "app:app", "--bind", "0.0.0.0:8000" ]
    restart: unless-stopped


  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - flask
    restart: unless-stopped


volumes:
  app_pgdata: